name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build macOS binary
        shell: bash
        run: |
          set -euo pipefail
          cd src
          clang++ -std=c++17 -O2 -fcolor-diagnostics -fansi-escape-codes -fobjc-arc \
            main.cpp gtl.cpp gtl_csv.cpp gtl_match.cpp gtl_calibration.cpp macos_native.mm \
            -framework Foundation -framework Vision -framework ApplicationServices \
            -framework CoreGraphics -framework ScreenCaptureKit \
            -o ../Duskull
          strip ../Duskull

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Privacy scan binary
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import sys

          data = Path("Duskull").read_bytes().lower()

          path_needles = [b"/users/", b"/home/", b"\\users\\"]
          ci_allowed_prefixes = [
            b"/users/runner/",
            b"/home/runner/",
            b"\\users\\runneradmin\\",
            b"\\users\\runner\\",
          ]

          suspicious = []

          for needle in path_needles:
            start = 0
            while True:
              idx = data.find(needle, start)
              if idx == -1:
                break
              sample = data[idx:idx + 160]
              if not any(sample.startswith(prefix) for prefix in ci_allowed_prefixes):
                suspicious.append(sample.decode("utf-8", errors="ignore"))
                break
              start = idx + 1

          if suspicious:
            print("Privacy scan failed. Found suspicious strings:")
            for item in sorted(set(suspicious)):
              print(f" - {item}")
            sys.exit(1)

          print("Privacy scan passed.")
          PY

      - name: Package macOS artifact
        shell: bash
        run: |
          set -euo pipefail
          zip -j Duskull-macos-arm64.zip Duskull

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v5
        with:
          name: Duskull-macos-arm64
          path: Duskull-macos-arm64.zip

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Build Windows binary
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          Set-Location src

          $args = @(
            "/std:c++17", "/utf-8", "/EHsc", "/permissive-", "/nologo", "/O2", "/W3", "/DNDEBUG", "/D_CRT_SECURE_NO_WARNINGS",
            "main.cpp", "gtl.cpp", "gtl_csv.cpp", "gtl_match.cpp", "gtl_calibration.cpp", "windows_platform.cpp",
            "/link", "user32.lib", "gdi32.lib", "psapi.lib", "windowsapp.lib",
            "/DEBUG:NONE", "/INCREMENTAL:NO", "/OPT:REF", "/OPT:ICF", "/out:..\Duskull.exe"
          )

          & cl.exe @args 2>&1 | Tee-Object -FilePath ..\windows-build.log
          if ($LASTEXITCODE -ne 0) {
            Write-Host "MSVC build failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      - name: Upload Windows build log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: windows-build-log
          path: windows-build.log

      - name: Strip Windows binary (best effort)
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          if (Get-Command llvm-strip -ErrorAction SilentlyContinue) {
            llvm-strip .\Duskull.exe
          } else {
            Write-Host "llvm-strip not found; continuing with /DEBUG:NONE release output"
          }

      - name: Privacy scan binary
        shell: powershell
        run: |
          $script = @'
          from pathlib import Path
          import sys

          data = Path("Duskull.exe").read_bytes().lower()

          # On Windows CI, only check for Unix-style paths; \users\ paths are
          # legitimately present from the MSVC/CRT build environment on the runner.
          path_needles = [b"/users/", b"/home/"]
          ci_allowed_prefixes = [
            b"/users/runner/",
            b"/home/runner/",
          ]

          suspicious = []

          for needle in path_needles:
              start = 0
              while True:
                  idx = data.find(needle, start)
                  if idx == -1:
                      break
                  sample = data[idx:idx + 160]
                  if not any(sample.startswith(prefix) for prefix in ci_allowed_prefixes):
                      suspicious.append(sample.decode("utf-8", errors="ignore"))
                      break
                  start = idx + 1

          if suspicious:
              print("Privacy scan failed. Found suspicious strings:")
              for item in sorted(set(suspicious)):
                  print(f" - {item}")
              sys.exit(1)

          print("Privacy scan passed.")
          '@

          Set-Content -Path .\privacy_scan.py -Value $script
          python .\privacy_scan.py
          Remove-Item .\privacy_scan.py -ErrorAction SilentlyContinue

      - name: Package Windows artifact
        shell: powershell
        run: |
          Compress-Archive -Path .\Duskull.exe -DestinationPath .\Duskull-windows-x64.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v5
        with:
          name: Duskull-windows-x64
          path: Duskull-windows-x64.zip

  publish-release:
    name: Publish release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/**/Duskull-macos-arm64.zip
            release-assets/**/Duskull-windows-x64.zip
